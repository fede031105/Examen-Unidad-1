<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Nuevo Vuelo</title></head>
<body>
<h2>Agregar Vuelo</h2>
<form th:action="@{/vuelos/guardar}" th:object="${vuelo}" method="post">
    ID: <input type="number" th:field="*{id}" required /><br/>
    Origen: <input type="text" th:field="*{origen}" required /><br/>
    Destino: <input type="text" th:field="*{destino}" required /><br/>
    Fecha: <input type="date" th:field="*{fecha}" required /><br/>
    Duración: <input type="number" th:field="*{duracion}" required /><br/>
    <button type="submit">Guardar</button> <a href="/vuelos">Cancelar</a>
</form>
</body>
</html>
